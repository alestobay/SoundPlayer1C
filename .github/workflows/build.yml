name: Build SoundPlayer1C

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: windows-latest

    steps:

    - uses: actions/checkout@v4

    - uses: microsoft/setup-msbuild@v2

    - uses: NuGet/setup-nuget@v2

    - run: nuget restore

    - run: msbuild SoundPlayer1C.csproj /p:Configuration=Release /p:Platform=x86

    - run: msbuild SoundPlayer1C.csproj /p:Configuration=Release /p:Platform=x64

    - uses: actions/upload-artifact@v4
      with:
        name: SoundPlayer1C
        path: |
          **/*.dll
