name: Build SoundPlayer1C

on:
  workflow_dispatch:

jobs:

  build:

    runs-on: windows-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore
      run: nuget restore

    - name: Build x86
      run: msbuild SoundPlayer1C.csproj /p:Configuration=Release /p:Platform=x86

    - name: Build x64
      run: msbuild SoundPlayer1C.csproj /p:Configuration=Release /p:Platform=x64

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: SoundPlayer1C
        path: |
          **/bin/x86/Release/*.dll
          **/bin/x64/Release/*.dll
